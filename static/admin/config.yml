backend:
  name: github
  repo: ghkdlxm005/SchoolKing_wiki
  branch: main
  # Replace with your deployed Cloudflare Worker URL (see CMS_로그인_설정_가이드.md).
  base_url: https://YOUR-WORKER-NAME.YOUR-SUBDOMAIN.workers.dev
  auth_endpoint: /github/authorize

site_url: https://ghkdlxm005.github.io/SchoolKing_wiki/
display_url: https://ghkdlxm005.github.io/SchoolKing_wiki/
publish_mode: simple
locale: ko

media_folder: static/uploads
public_folder: /SchoolKing_wiki/uploads

collections:
  - name: bugs
    label: "🐞 버그 (Bug)"
    label_singular: "버그"
    description: "BUG-#### 기록. 새 버그는 New로 만드세요."
    folder: docs/bugs
    create: true
    slug: "{{slug}}"
    fields:
      - { label: 제목, name: title, widget: string, required: false }
      - { label: 사이드바 순서, name: sidebar_position, widget: number, required: false, value_type: int }
      - { label: 태그, name: tags, widget: list, required: false, hint: "예: bug, weapon, system" }
      - { label: 본문, name: body, widget: markdown }

  - name: features
    label: "✨ 기능 (Feature)"
    label_singular: "기능"
    description: "FEAT-#### 기능 이력."
    folder: docs/features
    create: true
    slug: "{{slug}}"
    fields:
      - { label: 제목, name: title, widget: string, required: false }
      - { label: 사이드바 순서, name: sidebar_position, widget: number, required: false, value_type: int }
      - { label: 태그, name: tags, widget: list, required: false, hint: "예: bug, weapon, system" }
      - { label: 본문, name: body, widget: markdown }

